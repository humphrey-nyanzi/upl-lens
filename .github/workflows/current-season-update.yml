name: Hosted data update

on:
  workflow_dispatch:
    inputs:
      season:
        description: "Used when season_scope=custom. Comma-separated, e.g. 2024-25,2025-26"
        required: false
        default: "2025-26"
      season_scope:
        description: "Which seasons should this run target?"
        required: true
        default: "current"
        type: choice
        options:
          - current
          - all
          - custom
      run_type:
        description: "What kind of update should run?"
        required: true
        default: "routine-refresh"
        type: choice
        options:
          - routine-refresh
          - rebuild-from-existing-raw
          - artifact-only
      apply_migrations:
        description: "Admin setup only: apply database migrations before loading data"
        required: true
        default: false
        type: boolean
      use_cache:
        description: "Reuse cached HTML/checkpoint state instead of refreshing from the live source"
        required: true
        default: false
        type: boolean
      force_full_scrape:
        description: "Scrape every calendar match instead of using raw Postgres change detection"
        required: true
        default: false
        type: boolean
  schedule:
    - cron: "0 6 * * 1"

jobs:
  update-current-season:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      PYTHONUNBUFFERED: "1"
      SEASON_SCOPE: ${{ github.event.inputs.season_scope || 'current' }}
      CUSTOM_SEASONS: ${{ github.event.inputs.season || '2025-26' }}
      RUN_TYPE: ${{ github.event.inputs.run_type || 'routine-refresh' }}
      APPLY_MIGRATIONS: ${{ github.event.inputs.apply_migrations || 'false' }}
      USE_CACHE: ${{ github.event.inputs.use_cache || 'false' }}
      FORCE_FULL_SCRAPE: ${{ github.event.inputs.force_full_scrape || 'false' }}
      POSTGRES_HOST: ${{ secrets.POSTGRES_HOST }}
      POSTGRES_PORT: ${{ secrets.POSTGRES_PORT }}
      POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
      POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
      POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
      POSTGRES_SSLMODE: ${{ secrets.POSTGRES_SSLMODE || 'prefer' }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: requirements-automation.txt

      - name: Install Python dependencies
        run: python -m pip install -r requirements-automation.txt

      - name: Check database secrets for database update modes
        if: env.RUN_TYPE != 'artifact-only'
        run: |
          missing=0
          for name in POSTGRES_HOST POSTGRES_PORT POSTGRES_DB POSTGRES_USER POSTGRES_PASSWORD; do
            if [ -z "${!name}" ]; then
              echo "::error::$name is required when run_type updates the hosted database"
              missing=1
            fi
          done
          exit "$missing"

      - name: Run hosted data update
        run: >
          python scripts/data_platform/update_hosted_data.py
          --season-scope "$SEASON_SCOPE"
          --custom-seasons "$CUSTOM_SEASONS"
          --run-type "$RUN_TYPE"
          ${{ env.APPLY_MIGRATIONS == 'true' && '--apply-migrations' || '' }}
          ${{ env.USE_CACHE == 'true' && '--use-cache' || '' }}
          ${{ env.FORCE_FULL_SCRAPE == 'true' && '--force-full-scrape' || '' }}

      - name: Upload raw season files
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: raw-data-${{ env.SEASON_SCOPE }}-${{ env.RUN_TYPE }}
          path: data/raw/
          if-no-files-found: warn

      - name: Upload automation logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: automation-logs-${{ env.SEASON_SCOPE }}-${{ env.RUN_TYPE }}
          path: outputs/automation/
          if-no-files-found: warn
