name: Current season update

on:
  workflow_dispatch:
    inputs:
      season:
        description: "UPL season to update, for example 2025-26"
        required: true
        default: "2025-26"
      mode:
        description: "artifact-only uploads refreshed raw files; full also refreshes Postgres/staging"
        required: true
        default: "full"
        type: choice
        options:
          - artifact-only
          - full
      apply_migrations:
        description: "Admin setup only: apply database migrations before loading data"
        required: true
        default: false
        type: boolean
      use_cache:
        description: "Reuse cached HTML/checkpoint state instead of refreshing from the live source"
        required: true
        default: false
        type: boolean
  schedule:
    - cron: "0 6 * * 1"

jobs:
  update-current-season:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      UPDATE_SEASON: ${{ github.event.inputs.season || '2025-26' }}
      UPDATE_MODE: ${{ github.event.inputs.mode || 'full' }}
      APPLY_MIGRATIONS: ${{ github.event.inputs.apply_migrations || 'false' }}
      USE_CACHE: ${{ github.event.inputs.use_cache || 'false' }}
      POSTGRES_HOST: ${{ secrets.POSTGRES_HOST }}
      POSTGRES_PORT: ${{ secrets.POSTGRES_PORT }}
      POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
      POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
      POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
      POSTGRES_SSLMODE: ${{ secrets.POSTGRES_SSLMODE || 'prefer' }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: requirements-automation.txt

      - name: Install Python dependencies
        run: python -m pip install -r requirements-automation.txt

      - name: Check database secrets for full mode
        if: env.UPDATE_MODE == 'full'
        run: |
          missing=0
          for name in POSTGRES_HOST POSTGRES_PORT POSTGRES_DB POSTGRES_USER POSTGRES_PASSWORD; do
            if [ -z "${!name}" ]; then
              echo "::error::$name is required when mode=full"
              missing=1
            fi
          done
          exit "$missing"

      - name: Run current-season update
        run: >
          python scripts/data_platform/update_current_season.py
          --season "$UPDATE_SEASON"
          --mode "$UPDATE_MODE"
          ${{ env.APPLY_MIGRATIONS != 'true' && '--skip-migrations' || '' }}
          ${{ env.USE_CACHE == 'true' && '--use-cache' || '' }}

      - name: Upload raw season files
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: raw-season-${{ env.UPDATE_SEASON }}
          path: data/raw/
          if-no-files-found: warn

      - name: Upload automation logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: automation-logs-${{ env.UPDATE_SEASON }}
          path: outputs/automation/
          if-no-files-found: warn
